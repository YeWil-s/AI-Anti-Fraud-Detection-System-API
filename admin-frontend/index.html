<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 反诈防御系统 - 管理后台</title>
    <!-- 安全头部 -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <!-- 本地CSS资源 -->
    <link href="./lib/element-plus.index.min.css" rel="stylesheet">
    <!-- 图标字体使用CDN（需要字体文件） -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
    <!-- 添加加载动画样式 -->
    <style>
        #loading-mask {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }
        #loading-mask.hidden { opacity: 0; pointer-events: none; }
        .loading-spinner {
            width: 50px; height: 50px;
            border: 3px solid #374151;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            color: #9ca3af;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->
    <div id="loading-mask">
        <div style="text-align: center;">
            <div class="loading-spinner"></div>
            <div class="loading-text">系统加载中...</div>
        </div>
    </div>

    <div id="app" style="display: none;">
        <el-container class="app-wrapper">
            <el-aside width="220px" class="sidebar">
                <div class="logo"><i class="ri-shield-check-fill"></i> AI Sentinel</div>
                <el-menu :default-active="activePath" router background-color="#1f2937" text-color="#9ca3af" active-text-color="#fff">
                    <el-menu-item index="/">
                        <i class="ri-dashboard-line"></i>
                        <span style="margin-left:8px">监控仪表盘</span>
                    </el-menu-item>
                    <el-menu-item index="/rules">
                        <i class="ri-list-settings-line"></i>
                        <span style="margin-left:8px">关键词规则</span>
                    </el-menu-item>
                    <el-menu-item index="/blacklist">
                        <i class="ri-spam-line"></i>
                        <span style="margin-left:8px">黑名单管理</span>
                    </el-menu-item>
                    <el-menu-item index="/case-learning">
                        <i class="ri-brain-line"></i>
                        <span style="margin-left:8px">AI知识库</span>
                    </el-menu-item>
                    <el-menu-item index="/test">
                        <i class="ri-test-tube-line"></i>
                        <span style="margin-left:8px">规则测试台</span>
                    </el-menu-item>
                    <el-menu-item index="/users">
                        <i class="ri-user-settings-line"></i>
                        <span style="margin-left:8px">用户管理</span>
                    </el-menu-item>
                    <el-menu-item index="/families">
                        <i class="ri-home-heart-line"></i>
                        <span style="margin-left:8px">家庭组管理</span>
                    </el-menu-item>
                </el-menu>
            </el-aside>
            <el-container>
                <el-header class="header">
                    <div class="breadcrumb">管理控制台 / {{ currentRouteName }}</div>
                    <el-tag type="success" size="small">API 连接状态: 在线</el-tag>
                </el-header>
                <el-main>
                    <router-view></router-view>
                </el-main>
            </el-container>
        </el-container>
    </div>

    <!-- 本地JS资源 -->
    <script src="./lib/vue.global.prod.min.js"></script>
    <script src="./lib/vue-router.global.prod.min.js"></script>
    <script src="./lib/axios.min.js"></script>
    <script src="./lib/element-plus.index.full.min.js"></script>
    <!-- ECharts同步加载，确保图表初始化时可用 -->
    <script src="./lib/echarts.min.js"></script>
    
    <script type="module" src="./js/main.js"></script>
    
    <!-- 页面加载完成后隐藏loading -->
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loading-mask').classList.add('hidden');
                document.getElementById('app').style.display = 'block';
            }, 100);
        });
    </script>
</body>
</html>
