# 依赖：MySQL / Redis / MinIO
# 一体启动 API（镜像内包含 models/，见 Dockerfile 与 .dockerignore）：
#   1. copy .env.example .env，按 README.md 填写；若 MySQL 在本 compose 内，DATABASE_URL 须用主机名 mysql
#   2. docker compose --profile api up -d --build
#
# 仅启动依赖（本机 python main.py 时常用）：
#   docker compose up -d mysql redis minio

services:
  mysql:
    image: mysql:8.0
    container_name: ai_fraud_mysql
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: ai_fraud_detection
      MYSQL_USER: user
      MYSQL_PASSWORD: "123456"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai_fraud_network

  redis:
    image: redis:7-alpine
    container_name: ai_fraud_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ai_fraud_network

  minio:
    image: minio/minio:latest
    container_name: ai_fraud_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - ai_fraud_network

  api:
    profiles: ["api"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_fraud_api
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # 容器内必须用服务名访问；DATABASE_URL 完全由 .env 决定（本地 mysql 容器或远程库）
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - ai_fraud_network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  minio_data:

networks:
  ai_fraud_network:
    driver: bridge
